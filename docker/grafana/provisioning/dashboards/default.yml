# ForgeFlow AI - Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: "ForgeFlow Dashboards"
    orgId: 1
    folder: "ForgeFlow"
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
