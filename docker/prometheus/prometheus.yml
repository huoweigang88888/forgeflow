# ForgeFlow AI - Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: forgeflow-api

scrape_configs:
  - job_name: "forgeflow-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "forgeflow-api"
          env: "production"

  - job_name: "forgeflow-api-dev"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "forgeflow-api"
          env: "development"
