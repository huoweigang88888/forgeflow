# =============================================================================
# ForgeFlow AI - Prometheus Monitoring Config
# =============================================================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# Alerting rules
rule_files:
  - "alerts.yml"

# Scrape configs
scrape_configs:
  # ForgeFlow API
  - job_name: "forgeflow-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "forgeflow-api"
          env: "production"

  # Node exporter (host metrics)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # PostgreSQL exporter
  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Redis exporter
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Nginx exporter
  - job_name: "nginx-exporter"
    static_configs:
      - targets: ["nginx-exporter:9113"]
