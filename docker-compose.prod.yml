# =============================================================================
# ForgeFlow AI - Production Docker Compose
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - .env.production file with real secrets
#   - SSL certificates in ./certs/ (or use a reverse proxy)
#
# For production, consider using a managed database (Supabase/RDS) instead
# of the bundled postgres. This compose is for single-VM deployments.

version: "3.9"

services:
  # ============================================================================
  # PostgreSQL 16 + pgvector (consider managed DB for production)
  # ============================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: forgeflow-postgres-prod
    environment:
      POSTGRES_DB: forgeflow
      POSTGRES_USER: ${DB_USER:-forgeflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"  # Only listen on localhost
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgeflow -d forgeflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ============================================================================
  # Redis 7.2
  # ============================================================================
  redis:
    image: redis:7.2-alpine
    container_name: forgeflow-redis-prod
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ============================================================================
  # API Server (FastAPI)
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: forgeflow-api-prod
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
      replicas: 1  # Scale horizontally behind a load balancer

  # ============================================================================
  # Celery Worker (for async tasks: emails, embeddings, data retention)
  # ============================================================================
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: forgeflow-worker-prod
    env_file:
      - .env.production
    command: >
      celery -A forgeflow.worker.celery_app worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=100
      --time-limit=300
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ============================================================================
  # Celery Beat (scheduled tasks)
  # ============================================================================
  scheduler:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: forgeflow-scheduler-prod
    env_file:
      - .env.production
    command: >
      celery -A forgeflow.worker.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    depends_on:
      - redis
      - postgres
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ============================================================================
  # Reverse Proxy (Nginx)
  # ============================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: forgeflow-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

volumes:
  pgdata_prod:
    driver: local
  redisdata_prod:
    driver: local
  nginx_logs:
    driver: local
