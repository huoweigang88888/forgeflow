# Gitleaks Configuration for ForgeFlow AI
# Detects hardcoded secrets in the codebase.
# https://github.com/gitleaks/gitleaks

title = "ForgeFlow AI Gitleaks Config"

[allowlist]
description = "Files and paths to exclude from scanning"
paths = [
  '''pnpm-lock\.yaml''',
  '''uv\.lock''',
  '''\.env\.example''',
  '''\.pre-commit-config\.yaml''',
  '''tests/evaluation/golden/cases/.*\.yaml''',
]

[[rules]]
id = "deepseek-api-key"
description = "DeepSeek API Key"
regex = '''sk-[a-z0-9]{32,}'''
tags = ["api-key", "deepseek"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API Key"
regex = '''sk-[a-zA-Z0-9]{32,}'''
tags = ["api-key", "openai"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API Key"
regex = '''sk-ant-[a-zA-Z0-9_\-]{32,}'''
tags = ["api-key", "anthropic"]

[[rules]]
id = "generic-api-key-assignment"
description = "Generic API key assignment in config files"
regex = '''(?i)(api[_-]?key|apikey|secret[_-]?key)\s*=\s*[A-Za-z0-9_\-]{20,}'''
path = '''\.(env|yml|yaml|toml|json|py|ts|js)$'''
tags = ["api-key"]
