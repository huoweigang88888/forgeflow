# ForgeFlow AI - Gitleaks Configuration

title = "ForgeFlow AI Gitleaks Config"

[[rules]]
id = "generic-api-key"

[rules.allowlist]
  description = "Allowlist for test/dev keys safe to commit"

[rules.allowlist.paths]
  regexTarget = "line"
  paths = [
    '''tests/''',
    '''\.env\.example$''',
    '''\.md$''',
    '''docs/''',
    '''\.gitleaks\.toml$''',
    '''pnpm-lock\.yaml$''',
    '''uv\.lock$''',
  ]

[allowlist]
  description = "Global allowlist"

[allowlist.paths]
  paths = [
    '''\.env\.example$''',
    '''\.env\.production\.example$''',
    '''docs/''',
    '''tests/''',
    '''\.gitleaks\.toml$''',
  ]
