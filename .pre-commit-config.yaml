# ForgeFlow AI - Pre-commit Hooks Configuration
# Run: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # --- Python: Ruff (Lint + Format) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff-format
        files: ^apps/api/
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^apps/api/

  # --- Python: MyPy (local, uses project's own mypy) ---
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv
        language: system
        args:
          - "run"
          - "--directory"
          - "apps/api"
          - "python"
          - "-m"
          - "mypy"
          - "--check-untyped-defs"
          - "src/forgeflow"
        files: ^apps/api/
        pass_filenames: false

  # --- TypeScript: Biome ---
  - repo: https://github.com/biomejs/pre-commit
    rev: v0.6.1
    hooks:
      - id: biome-check
        files: ^apps/web/
        additional_dependencies:
          - "@biomejs/biome@1.9.2"

  # --- General: Security & Sanity ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
        exclude: \.mako$
      - id: trailing-whitespace
        exclude: \.md$
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
