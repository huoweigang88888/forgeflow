# Golden Test Cases — Intent Variants (6 cases)
# One per intent category, using mock provider defaults.

- id: "golden_001"
  name: "Shipping Delay — Low Value — Auto Refund"
  description: "Customer reports shipping delay for low-value order. Should auto-refund without approval."
  tags: [intent:shipping_delay, fulfillment:fulfilled, amount:low]
  input:
    platform: "mock"
    customer_email: "test_buyer@example.com"
    issue_text: "My order hasn't arrived for 15 days. Where is it?"
    order_id: "order_golden_001"
  mock_overrides:
    order:
      total_price: 25.00
      fulfillment_status: "fulfilled"
    logistics:
      status: "delayed"
      days_in_transit: 15
  expected:
    intent: "shipping_delay"
    recommended_action: "auto_refund"
    requires_approval: false
    refund_amount_range: [20.00, 30.00]
    status: "resolved"

- id: "golden_002"
  name: "Refund Request — Unfulfilled — Auto Refund"
  description: "Customer requests refund for unfulfilled order. Should auto-refund."
  tags: [intent:refund_request, fulfillment:unfulfilled, amount:low]
  input:
    platform: "mock"
    customer_email: "buyer@test.com"
    issue_text: "I want my money back. Please refund my order now."
    order_id: "order_golden_002"
  mock_overrides:
    order:
      total_price: 45.60
      fulfillment_status: "unfulfilled"
  expected:
    intent: "refund_request"
    recommended_action: "auto_refund"
    requires_approval: false
    status: "resolved"

