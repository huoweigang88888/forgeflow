# Golden Test Cases — Non-English Cases (3 cases)

- id: "golden_060"
  name: "Chinese — Shipping Delay — Process Correctly"
  description: "Customer reports shipping delay in Chinese."
  tags: [non_english:zh, shipping_delay]
  input:
    platform: "mock"
    customer_email: "chinese@test.com"
    issue_text: "我的订单已经15天没有收到了，在哪里？请退款。"
    order_id: "order_golden_060"
  mock_overrides:
    order:
      total_price: 35.00
      fulfillment_status: "fulfilled"
    logistics:
      status: "delayed"
      days_in_transit: 15
  expected:
    intent: "shipping_delay"
    recommended_action: "auto_refund"
    requires_approval: false
    refund_amount_range: [30.00, 40.00]
    status: "resolved"

