# Alembic configuration for ForgeFlow AI

[alembic]
# Path to migration scripts
script_location = src/forgeflow/db/alembic

# Output encoding
prepend_sys_path = .
sqlalchemy.url = postgresql+asyncpg://forgeflow:forgeflow_dev@localhost:5432/forgeflow

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
